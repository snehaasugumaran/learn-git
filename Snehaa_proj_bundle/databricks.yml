# This is a Databricks asset bundle definition for Snehaa_proj_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Snehaa_proj_bundle
  uuid: c6e73bc2-a862-4770-bdfc-47d9bcc4026c

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-1e9baf64-d570.cloud.databricks.com
    variables:
      catalog: snehaa_proj_dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-1e9baf64-d570.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/snehaasugumaran@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/snehaasugumaran@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: snehaa_proj_dev
      schema: prod
    permissions:
      - user_name: snehaasugumaran@gmail.com
        level: CAN_MANAGE
